name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    paths:
      - 'multi_agent/extras/visualize_compliance.py'
      - 'multi_agent/extras/visualize_config.yaml'
      - '.github/workflows/build_exe.yml'
  workflow_dispatch:   # also allow manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "VEGO-AI" `
            --add-data "multi_agent/extras/visualize_config.yaml;." `
            multi_agent/extras/visualize_compliance.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: VEGO-AI-Windows
          path: dist/VEGO-AI.exe
          retention-days: 30
